<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없습니다 — F5 새로고침 프로젝트</title>
<link rel="stylesheet" href="style.css">
<style>
.error-page {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0A1F5C 0%, #1B3A8C 60%, #2952C8 100%);
  text-align: center; padding: 40px 24px;
}
.error-card {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px; padding: 60px 48px; max-width: 520px; backdrop-filter: blur(8px);
}
.error-code { font-size: 96px; font-weight: 900; color: rgba(255,255,255,0.12); line-height: 1; }
.error-f5 { font-size: 32px; font-weight: 800; color: #7FECB4; margin: 8px 0; }
.error-msg { font-size: 16px; color: rgba(255,255,255,0.75); margin: 16px 0 32px; line-height: 1.7; }
.error-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 36px; }
.error-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
@media (max-width: 480px) {
  .error-card { padding: 40px 24px; }
  .error-code { font-size: 72px; }
  .error-btns { flex-direction: column; align-items: center; }
  .error-btns .btn { width: 100%; max-width: 260px; justify-content: center; }
}
</style>
</head>
<body>
<div class="error-page">
  <div class="error-card">
    <div class="error-code">404</div>
    <div class="error-f5">F5를 눌러 새로고침!</div>
    <p class="error-msg">요청하신 페이지를 찾을 수 없습니다.<br>주소를 확인하거나 홈으로 돌아가 주세요.</p>
    <p class="error-sub">Page not found. Please check the URL or return to the homepage.</p>
    <div class="error-btns">
      <a href="index.html" class="btn btn-white">🏠 홈으로 가기</a>
      <a href="partner.html" class="btn btn-outline">파트너 참여 →</a>
    </div>
  </div>
</div>
</body>
</html>
